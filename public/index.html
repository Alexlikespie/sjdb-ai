<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Buddy AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="description" content="Buddy AI — a chat interface for the Buddy AI assistant. Two models: Pro and Mini.">

    <link rel="icon" type="image/png" href="placeholder.png">
    <link rel="apple-touch-icon" href="placeholder.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* ------------------------------------------------------------------ */
        /*  Buddy AI — design tokens                                            */
        /* ------------------------------------------------------------------ */
        :root {
            /* Surface — midnight, slightly lifted in the middle */
            --bg-0:        #070708;
            --bg-1:        #0d0d10;
            --bg-2:        #141418;
            --bg-3:        #1c1c22;
            --bg-elev:     #1f1f26;

            /* Border + dividers — barely there */
            --border-1:    rgba(255, 255, 255, 0.06);
            --border-2:    rgba(255, 255, 255, 0.10);
            --border-3:    rgba(255, 255, 255, 0.18);

            /* Text */
            --text-1:      #f3f3f5;     /* primary */
            --text-2:      #b8b8c0;     /* secondary */
            --text-3:      #74747d;     /* tertiary / labels */
            --text-on-acc: #0a0a0a;     /* on electric yellow */

            /* The ONE accent — warm school yellow. School colors, futuristic but warm. */
            --accent:        #ffe14a;
            --accent-soft:   rgba(255, 225, 74, 0.18);
            --accent-glow:   rgba(255, 225, 74, 0.35);
            --accent-bright: #fff07a;

            /* Functional */
            --error:      #ff6363;
            --success:    #6dffb3;

            /* Radii */
            --r-sm: 8px;
            --r-md: 12px;
            --r-lg: 16px;
            --r-xl: 22px;
            --r-pill: 999px;

            /* Type */
            --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

            /* Motion */
            --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
            --d-fast: 140ms;
            --d-med:  240ms;
            --d-slow: 420ms;

            /* Layout */
            --sidebar-w: 288px;
        }

        /* ------------------------------------------------------------------ */
        /*  Reset + base                                                       */
        /* ------------------------------------------------------------------ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: var(--font-sans);
            font-size: 15px;
            line-height: 1.55;
            color: var(--text-1);
            background: var(--bg-0);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
        }
        button, input, select, textarea { font: inherit; color: inherit; }
        button { background: none; border: 0; cursor: pointer; }
        a { color: var(--accent); text-decoration: none; }

        ::selection { background: var(--accent); color: var(--text-on-acc); }

        /* Scrollbars — minimal */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-3); }

        /* ------------------------------------------------------------------ */
        /*  Aurora background — the signature                                  */
        /* ------------------------------------------------------------------ */
        .aurora {
            position: fixed; inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background: var(--bg-0);
        }
        .aurora::before,
        .aurora::after {
            content: "";
            position: absolute;
            width: 60vmax; height: 60vmax;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.55;
            will-change: transform;
        }
        .aurora::before {
            top: -25vmax; right: -20vmax;
            background: radial-gradient(circle at 30% 30%, var(--accent) 0%, transparent 60%);
            animation: aurora-drift-1 22s var(--ease) infinite alternate;
        }
        .aurora::after {
            bottom: -30vmax; left: -25vmax;
            background: radial-gradient(circle at 60% 60%, rgba(255, 225, 74, 0.55) 0%, transparent 65%);
            animation: aurora-drift-2 28s var(--ease) infinite alternate;
        }
        .aurora-grain {
            position: absolute; inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 3px 3px;
            mix-blend-mode: overlay;
            opacity: 0.4;
        }
        @keyframes aurora-drift-1 {
            0%   { transform: translate(0, 0)        rotate(0deg)   scale(1);   }
            100% { transform: translate(-8vmax, 4vmax) rotate(40deg) scale(1.15); }
        }
        @keyframes aurora-drift-2 {
            0%   { transform: translate(0, 0)        rotate(0deg)   scale(1);   }
            100% { transform: translate(6vmax, -5vmax) rotate(-30deg) scale(1.1); }
        }
        @media (prefers-reduced-motion: reduce) {
            .aurora::before, .aurora::after { animation: none; }
        }

        /* ------------------------------------------------------------------ */
        /*  App shell                                                          */
        /* ------------------------------------------------------------------ */
        .app {
            position: relative; z-index: 1;
            display: flex;
            width: 100%;
            height: 100vh;
            height: 100dvh;
        }

        /* ------------------------------------------------------------------ */
        /*  Sidebar                                                            */
        /* ------------------------------------------------------------------ */
        .sidebar {
            position: relative;
            width: var(--sidebar-w);
            flex-shrink: 0;
            background: rgba(13, 13, 16, 0.78);
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
            border-right: 1px solid var(--border-1);
            display: flex;
            flex-direction: column;
            padding: 22px 18px;
            z-index: 20;
            transition: transform var(--d-med) var(--ease);
        }

        .brand {
            display: flex; align-items: center; gap: 12px;
            padding: 4px 6px 18px;
            border-bottom: 1px solid var(--border-1);
            margin-bottom: 18px;
        }
        .brand-logo {
            width: 44px; height: 44px;
            border-radius: 12px;
            background: var(--accent);
            display: grid; place-items: center;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 8px 24px -10px var(--accent-glow);
        }
        .brand-logo img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        .brand-logo-fallback {
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 15px;
            color: var(--text-on-acc);
            letter-spacing: -0.02em;
        }
        .brand-name {
            display: flex; flex-direction: column;
            line-height: 1.1;
        }
        .brand-name strong {
            font-weight: 700;
            font-size: 16px;
            letter-spacing: -0.01em;
        }
        .brand-name span {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-3);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-top: 3px;
        }

        .nav-section { margin-bottom: 22px; }
        .nav-label {
            display: block;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 500;
            color: var(--text-3);
            letter-spacing: 0.16em;
            text-transform: uppercase;
            margin: 0 6px 10px;
        }

        /* Model switcher — custom pill select */
        .model-picker {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .model-option {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px;
            border-radius: var(--r-md);
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-2);
            cursor: pointer;
            transition: background var(--d-fast) var(--ease),
                        border-color var(--d-fast) var(--ease),
                        color var(--d-fast) var(--ease),
                        transform var(--d-fast) var(--ease);
            text-align: left;
            width: 100%;
        }
        .model-option:hover {
            background: var(--bg-2);
            color: var(--text-1);
        }
        .model-option:active { transform: scale(0.98); }
        .model-option[aria-pressed="true"] {
            background: var(--accent-soft);
            border-color: rgba(255, 225, 74, 0.35);
            color: var(--text-1);
        }
        .model-option[aria-pressed="true"] .model-dot {
            background: var(--accent);
            box-shadow: 0 0 0 3px rgba(255, 225, 74, 0.18);
        }
        .model-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--border-3);
            flex-shrink: 0;
            transition: background var(--d-fast) var(--ease), box-shadow var(--d-fast) var(--ease);
        }
        .model-name {
            font-weight: 600;
            font-size: 14px;
            flex: 1;
        }
        .model-tag {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--bg-3);
            color: var(--text-3);
        }
        .model-option[aria-pressed="true"] .model-tag {
            background: var(--accent);
            color: var(--text-on-acc);
        }

        .key-btn {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            width: 100%;
            margin-top: 8px;
            padding: 8px 10px;
            background: transparent;
            border: 1px dashed var(--border-2);
            border-radius: var(--r-md);
            color: var(--text-2);
            font-family: var(--font-mono);
            font-size: 10.5px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: background var(--d-fast) var(--ease), color var(--d-fast) var(--ease), border-color var(--d-fast) var(--ease);
        }
        .key-btn:hover {
            background: var(--bg-2);
            color: var(--text-1);
            border-color: var(--border-3);
        }
        .key-btn svg { width: 12px; height: 12px; }
        .key-btn.is-active {
            background: var(--accent-soft);
            color: var(--accent);
            border-color: rgba(255, 225, 74, 0.4);
            border-style: solid;
        }

        .new-chat-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%;
            padding: 11px 14px;
            border-radius: var(--r-md);
            background: var(--accent);
            color: var(--text-on-acc);
            font-weight: 600;
            font-size: 14px;
            transition: transform var(--d-fast) var(--ease),
                        background var(--d-fast) var(--ease),
                        box-shadow var(--d-med) var(--ease);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 6px 20px -8px var(--accent-glow);
        }
        .new-chat-btn:hover {
            background: var(--accent-bright);
            transform: translateY(-1px);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 10px 24px -8px var(--accent-glow);
        }
        .new-chat-btn:active { transform: translateY(0); }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            margin: 0 -8px;
            padding: 4px 8px;
        }
        .chat-list-empty {
            font-size: 13px;
            color: var(--text-3);
            padding: 12px;
            text-align: center;
            font-style: italic;
        }
        .chat-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px;
            border-radius: var(--r-md);
            cursor: pointer;
            color: var(--text-2);
            font-size: 13.5px;
            transition: background var(--d-fast) var(--ease), color var(--d-fast) var(--ease);
            position: relative;
            border: 1px solid transparent;
        }
        .chat-item:hover {
            background: var(--bg-2);
            color: var(--text-1);
        }
        .chat-item.active {
            background: var(--bg-3);
            color: var(--text-1);
            border-color: var(--border-2);
        }
        .chat-item-title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-item-delete {
            width: 22px; height: 22px;
            border-radius: 6px;
            display: grid; place-items: center;
            color: var(--text-3);
            opacity: 0;
            transition: opacity var(--d-fast) var(--ease), background var(--d-fast) var(--ease), color var(--d-fast) var(--ease);
        }
        .chat-item:hover .chat-item-delete,
        .chat-item.active .chat-item-delete { opacity: 1; }
        .chat-item-delete:hover { background: rgba(255, 99, 99, 0.15); color: var(--error); }
        .chat-item-delete svg { width: 12px; height: 12px; }

        .sidebar-footer {
            padding-top: 16px;
            border-top: 1px solid var(--border-1);
        }

        .sidebar-toggle {
            width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 8px 12px;
            border-radius: var(--r-md);
            background: var(--bg-2);
            border: 1px solid var(--border-1);
            color: var(--text-2);
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            transition: background var(--d-fast) var(--ease), color var(--d-fast) var(--ease), border-color var(--d-fast) var(--ease);
        }
        .sidebar-toggle:hover {
            background: var(--bg-3);
            color: var(--text-1);
            border-color: var(--border-2);
        }
        .sidebar-toggle svg { width: 14px; height: 14px; }
        .sidebar-toggle .icon-expand { display: none; }

        /* Floating expand button - appears when sidebar is collapsed on desktop */
        .expand-float {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: 30;
            width: 32px;
            height: 64px;
            display: none;
            align-items: center;
            justify-content: center;
            background: var(--bg-2);
            border: 1px solid var(--border-1);
            border-left: none;
            border-radius: 0 var(--r-md) var(--r-md) 0;
            color: var(--text-2);
            cursor: pointer;
            transition: background var(--d-fast) var(--ease), color var(--d-fast) var(--ease), transform 160ms var(--ease);
        }
        .expand-float:hover {
            background: var(--bg-3);
            color: var(--text-1);
            transform: translateY(-50%) translateX(2px);
        }
        .expand-float svg { width: 16px; height: 16px; }

        @media (min-width: 821px) {
            .sidebar.is-collapsed ~ .expand-float,
            body:has(.sidebar.is-collapsed) .expand-float {
                display: flex;
            }
            .sidebar.is-collapsed {
                display: none;
            }
        }

        /* ------------------------------------------------------------------ */
        /*  Main content                                                       */
        /* ------------------------------------------------------------------ */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            position: relative;
        }

        .topbar {
            display: flex; align-items: center; gap: 14px;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-1);
            background: rgba(10, 10, 12, 0.55);
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            z-index: 5;
        }
        .menu-btn {
            display: none;
            width: 38px; height: 38px;
            border-radius: var(--r-md);
            color: var(--text-2);
            align-items: center; justify-content: center;
            transition: background var(--d-fast) var(--ease), color var(--d-fast) var(--ease);
        }
        .menu-btn:hover { background: var(--bg-2); color: var(--text-1); }
        .menu-btn svg { width: 20px; height: 20px; }

        .topbar-info {
            display: flex; flex-direction: column;
            line-height: 1.15;
            min-width: 0;
        }
        .topbar-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .topbar-sub { display: none; }
        .status-dot { display: none; }

        .model-pill {
            margin-left: auto;
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 12px 6px 8px;
            background: var(--accent);
            color: var(--text-on-acc);
            border-radius: var(--r-pill);
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .model-pill-dot {
            width: 6px; height: 6px;
            background: var(--text-on-acc);
            border-radius: 50%;
        }

        /* ------------------------------------------------------------------ */
        /*  Chat                                                               */
        /* ------------------------------------------------------------------ */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 32px 0 24px;
            scroll-behavior: smooth;
        }
        .messages {
            max-width: 760px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .message {
            display: flex;
            gap: 14px;
            max-width: 100%;
            animation: msg-in 360ms var(--ease) both;
        }
        .message.user {
            flex-direction: row-reverse;
        }
        @keyframes msg-in {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 32px; height: 32px;
            flex-shrink: 0;
            border-radius: 50%;
            display: grid; place-items: center;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: -0.02em;
            background: var(--bg-3);
            color: var(--text-1);
            border: 1px solid var(--border-2);
        }
        .message.assistant .avatar {
            background: var(--accent);
            color: var(--text-on-acc);
            border-color: transparent;
            box-shadow: 0 0 0 3px rgba(255, 225, 74, 0.08);
            overflow: hidden;
        }
        .message.assistant .avatar img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        .message.user .avatar {
            background: var(--bg-elev);
            color: var(--text-2);
        }

        .msg-body {
            display: flex; flex-direction: column;
            gap: 4px;
            min-width: 0;
            max-width: calc(100% - 46px);
        }
        .message.user .msg-body { align-items: flex-end; }

        .msg-meta {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-3);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0 4px;
        }
        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-1);
            background: var(--bg-2);
            border: 1px solid var(--border-1);
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .message.user .bubble {
            background: var(--bg-elev);
            border-color: var(--border-2);
            border-bottom-right-radius: 6px;
        }
        .message.assistant .bubble {
            background: transparent;
            border-color: transparent;
            padding-left: 4px;
        }
        .bubble > *:first-child { margin-top: 0; }
        .bubble > *:last-child  { margin-bottom: 0; }
        .bubble p { margin: 0.5em 0; }
        .bubble h1, .bubble h2, .bubble h3, .bubble h4 {
            font-weight: 700;
            margin: 0.8em 0 0.4em;
            line-height: 1.25;
        }
        .bubble h1 { font-size: 1.35em; }
        .bubble h2 { font-size: 1.2em; }
        .bubble h3 { font-size: 1.08em; }
        .bubble ul, .bubble ol { padding-left: 1.4em; margin: 0.5em 0; }
        .bubble li { margin: 0.2em 0; }
        .bubble code {
            font-family: var(--font-mono);
            font-size: 0.88em;
            background: rgba(255, 225, 74, 0.12);
            color: var(--accent);
            padding: 1px 6px;
            border-radius: 5px;
        }
        .bubble pre {
            background: var(--bg-1);
            border: 1px solid var(--border-1);
            border-radius: var(--r-md);
            padding: 14px 16px;
            overflow-x: auto;
            margin: 0.7em 0;
        }
        .bubble pre code {
            background: transparent;
            color: var(--text-1);
            padding: 0;
            font-size: 0.85em;
        }
        .bubble blockquote {
            border-left: 2px solid var(--accent);
            margin: 0.6em 0;
            padding: 0.1em 0 0.1em 1em;
            color: var(--text-2);
        }
        .bubble a {
            color: var(--accent);
            border-bottom: 1px solid rgba(255, 225, 74, 0.4);
        }
        .bubble table {
            border-collapse: collapse;
            margin: 0.6em 0;
            font-size: 0.92em;
        }
        .bubble th, .bubble td {
            border: 1px solid var(--border-2);
            padding: 6px 10px;
            text-align: left;
        }
        .bubble th {
            background: var(--bg-2);
            font-weight: 600;
        }
        .bubble img { max-width: 100%; border-radius: 8px; }
        .bubble hr {
            border: 0;
            border-top: 1px solid var(--border-2);
            margin: 1em 0;
        }

        .thinking {
            display: inline-flex; align-items: center; gap: 8px;
            color: var(--text-2);
            font-style: italic;
        }
        .thinking::after {
            content: "";
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 1.1s var(--ease) infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(0.6); opacity: 0.4; }
            50%      { transform: scale(1);   opacity: 1;   }
        }

        .error-text { color: var(--error); font-weight: 500; }
        .error-text strong { color: var(--error); }

        .error-block {
            display: flex; flex-direction: column; gap: 8px;
            padding: 14px 16px;
            background: rgba(255, 99, 99, 0.08);
            border: 1px solid rgba(255, 99, 99, 0.25);
            border-radius: var(--r-md);
        }
        .error-title { font-weight: 600; color: var(--text-1); font-size: 14.5px; }
        .error-body  { color: var(--text-2); font-size: 13.5px; line-height: 1.5; }
        .error-actions {
            display: flex; flex-wrap: wrap; gap: 8px;
            margin-top: 6px;
        }

        /* Welcome state */
        .welcome {
            text-align: center;
            padding: 48px 24px 16px;
            animation: msg-in 600ms var(--ease) both;
        }
        .welcome-mark {
            width: 84px; height: 84px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: var(--accent);
            display: grid; place-items: center;
            color: var(--text-on-acc);
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 28px;
            overflow: hidden;
            box-shadow: 0 12px 40px -10px var(--accent-glow),
                        0 0 0 4px rgba(255, 225, 74, 0.10);
            animation: float 6s ease-in-out infinite;
        }
        .welcome-mark img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-6px); }
        }
        .welcome h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }
        .welcome h1 .accent { color: var(--accent); }
        .welcome p {
            color: var(--text-2);
            font-size: 15px;
            max-width: 480px;
            margin: 0 auto 28px;
        }
        .suggestions {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            max-width: 640px;
            margin: 0 auto;
        }
        .suggestion {
            padding: 12px 14px;
            background: var(--bg-2);
            border: 1px solid var(--border-1);
            border-radius: var(--r-md);
            font-size: 13px;
            color: var(--text-2);
            text-align: left;
            cursor: pointer;
            transition: background var(--d-fast) var(--ease), border-color var(--d-fast) var(--ease), color var(--d-fast) var(--ease), transform var(--d-fast) var(--ease);
        }
        .suggestion:hover {
            background: var(--bg-3);
            border-color: var(--border-2);
            color: var(--text-1);
            transform: translateY(-1px);
        }
        .suggestion:active { transform: translateY(0); }

        /* ------------------------------------------------------------------ */
        /*  Composer                                                           */
        /* ------------------------------------------------------------------ */
        .composer {
            padding: 8px 24px 24px;
            background: linear-gradient(to top, var(--bg-0) 60%, transparent);
        }
        .composer-inner {
            max-width: 760px;
            margin: 0 auto;
        }
        .composer-form {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            padding: 10px 10px 10px 18px;
            background: var(--bg-2);
            border: 1px solid var(--border-2);
            border-radius: var(--r-xl);
            transition: border-color var(--d-fast) var(--ease), box-shadow var(--d-med) var(--ease), background var(--d-fast) var(--ease);
        }
        .composer-form:focus-within {
            border-color: rgba(255, 225, 74, 0.45);
            box-shadow: 0 0 0 4px rgba(255, 225, 74, 0.08);
            background: var(--bg-elev);
        }
        .composer-input {
            flex: 1;
            background: transparent;
            border: 0;
            outline: 0;
            color: var(--text-1);
            font-size: 15px;
            line-height: 1.5;
            padding: 8px 0;
            min-height: 24px;
            max-height: 200px;
            resize: none;
            font-family: inherit;
        }
        .composer-input::placeholder { color: var(--text-3); }

        .send-btn {
            flex-shrink: 0;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--accent);
            color: var(--text-on-acc);
            display: grid; place-items: center;
            transition: background var(--d-fast) var(--ease),
                        transform var(--d-fast) var(--ease),
                        box-shadow var(--d-med) var(--ease),
                        opacity var(--d-fast) var(--ease);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 6px 18px -8px var(--accent-glow);
        }
        .send-btn:hover:not(:disabled) {
            background: var(--accent-bright);
            transform: scale(1.05);
        }
        .send-btn:active:not(:disabled) { transform: scale(0.95); }
        .send-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            box-shadow: none;
        }
        .send-btn svg {
            width: 18px; height: 18px;
            transition: transform var(--d-fast) var(--ease);
        }
        .send-btn.is-sending svg { animation: send-pulse 1s var(--ease) infinite; }
        @keyframes send-pulse {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-2px); }
        }

        .composer-hint {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-3);
            letter-spacing: 0.08em;
            text-align: center;
            margin-top: 10px;
        }
        .composer-hint kbd {
            display: inline-block;
            padding: 1px 5px;
            border-radius: 4px;
            background: var(--bg-2);
            border: 1px solid var(--border-2);
            color: var(--text-2);
            font-size: 10px;
            font-family: var(--font-mono);
        }

        /* ------------------------------------------------------------------ */
        /*  In-app confirm dialog (replaces native confirm)                    */
        /* ------------------------------------------------------------------ */
        .scrim {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            animation: scrim-in var(--d-med) var(--ease);
        }
        .scrim[data-open="true"] { display: flex; }
        @keyframes scrim-in { from { opacity: 0; } to { opacity: 1; } }

        .dialog {
            background: var(--bg-2);
            border: 1px solid var(--border-2);
            border-radius: var(--r-lg);
            padding: 24px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 24px 60px -10px rgba(0,0,0,0.6);
            animation: dialog-in var(--d-med) var(--ease);
        }
        @keyframes dialog-in {
            from { opacity: 0; transform: translateY(8px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .dialog h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .dialog p {
            color: var(--text-2);
            font-size: 14px;
            margin-bottom: 20px;
        }
        .dialog-actions {
            display: flex; gap: 8px; justify-content: flex-end;
        }
        .btn {
            padding: 9px 16px;
            border-radius: var(--r-md);
            font-size: 13.5px;
            font-weight: 600;
            transition: background var(--d-fast) var(--ease), transform var(--d-fast) var(--ease);
        }
        .btn:active { transform: scale(0.98); }
        .btn-ghost {
            background: transparent;
            color: var(--text-2);
            border: 1px solid var(--border-2);
        }
        .btn-ghost:hover { background: var(--bg-3); color: var(--text-1); }
        .btn-primary {
            background: var(--accent);
            color: var(--text-on-acc);
        }
        .btn-primary:hover { background: var(--accent-bright); }
        .btn-danger {
            background: rgba(255, 99, 99, 0.12);
            color: var(--error);
            border: 1px solid rgba(255, 99, 99, 0.3);
        }
        .btn-danger:hover { background: rgba(255, 99, 99, 0.2); }

        /* API key modal — clean, single password input */
        .api-key-input {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg-1);
            border: 1px solid var(--border-2);
            border-radius: var(--r-md);
            color: var(--text-1);
            font-family: var(--font-mono);
            font-size: 13.5px;
            letter-spacing: 0.02em;
            outline: 0;
            margin-top: 4px;
            transition: border-color var(--d-fast) var(--ease), box-shadow var(--d-med) var(--ease);
        }
        .api-key-input:focus {
            border-color: rgba(255, 225, 74, 0.5);
            box-shadow: 0 0 0 4px rgba(255, 225, 74, 0.08);
        }
        .api-key-input::placeholder { color: var(--text-3); }
        .api-key-hint {
            font-size: 12px;
            color: var(--error);
            margin-top: 8px;
            min-height: 1em;
        }
        .api-key-hint.ok { color: var(--success); }

        /* ------------------------------------------------------------------ */
        /*  Mobile                                                             */
        /* ------------------------------------------------------------------ */
        .sidebar-scrim {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 15;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--d-med) var(--ease);
        }

        @media (max-width: 820px) {
            .sidebar {
                position: fixed;
                top: 0; bottom: 0; left: 0;
                height: 100dvh;
                transform: translateX(-100%);
                box-shadow: 0 20px 60px -10px rgba(0,0,0,0.6);
                width: min(86vw, 320px);
            }
            .sidebar[data-open="true"] {
                transform: translateX(0);
            }
            .sidebar[data-open="true"] ~ .sidebar-scrim {
                opacity: 1;
                pointer-events: auto;
            }
            .menu-btn { display: inline-flex; }
            .topbar { padding: 12px 16px; }
            .model-pill { font-size: 10px; padding: 5px 10px 5px 7px; }
            .chat { padding: 20px 0 16px; }
            .messages { padding: 0 16px; gap: 20px; }
            .composer { padding: 4px 12px 16px; }
            .composer-form { padding: 8px 8px 8px 14px; }
            .bubble { font-size: 14.5px; }
            .welcome h1 { font-size: 22px; }
        }

        @media (max-width: 820px) {
            .suggestions { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }

        @media (max-width: 480px) {
            .suggestions { grid-template-columns: 1fr; }
        }

        /* Focus visibility for keyboard users — never a hard square outline;
           we let the existing rounded box-shadow rings do the work. */
        :focus { outline: none; }
        :focus-visible { outline: none; }
    </style>
</head>

<body>

    <div class="aurora" aria-hidden="true">
        <div class="aurora-grain"></div>
    </div>

    <div class="app">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar" aria-label="Chat history and settings">

            <div class="brand">
                <div class="brand-logo" id="brandLogo">
                    <!-- Filled in JS so a missing placeholder.png shows a clean monogram -->
                </div>
                <div class="brand-name">
                    <strong>Buddy AI</strong>
                </div>
            </div>

            <div class="nav-section">
                <span class="nav-label">Model</span>
                <div class="model-picker" id="modelPicker" role="radiogroup" aria-label="Choose model">
                    <button class="model-option" type="button" role="radio" data-model="pro" aria-pressed="true" aria-checked="true">
                        <span class="model-dot" aria-hidden="true"></span>
                        <span class="model-name">Pro</span>
                        <span class="model-tag">Default</span>
                    </button>
                    <button class="model-option" type="button" role="radio" data-model="mini" aria-pressed="false" aria-checked="false">
                        <span class="model-dot" aria-hidden="true"></span>
                        <span class="model-name">Mini</span>
                        <span class="model-tag">Local</span>
                    </button>
                </div>
            </div>

            <div class="nav-section" style="flex: 1; min-height: 0; display: flex; flex-direction: column;">
                <span class="nav-label">New conversation</span>
                <button class="new-chat-btn" type="button" id="newChatBtn" title="Start a new conversation (Ctrl+Shift+O)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    New chat
                </button>
            </div>

            <div class="sidebar-footer">
                <button class="sidebar-toggle" type="button" id="sidebarToggle" aria-label="Collapse sidebar" aria-expanded="true" aria-controls="sidebar">
                    <svg class="icon-collapse" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                    <svg class="icon-expand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                    <span class="sidebar-toggle-label">Collapse</span>
                </button>
            </div>
        </aside>

        <div class="sidebar-scrim" id="sidebarScrim" aria-hidden="true"></div>

        <!-- Floating button to expand sidebar when collapsed -->
        <button class="expand-float" type="button" id="expandFloat" aria-label="Open sidebar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </button>

        <!-- Main -->
        <main class="main">

            <header class="topbar">
                <button class="menu-btn" type="button" id="menuBtn" aria-label="Open menu" aria-expanded="false" aria-controls="sidebar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>

                <div class="topbar-info">
                    <div class="topbar-title" id="chatTitle">New conversation</div>
                </div>

                <div class="model-pill" id="modelPill" title="Current model">
                    <span class="model-pill-dot" aria-hidden="true"></span>
                    <span id="modelPillLabel">Pro</span>
                </div>
            </header>

            <section class="chat" id="chatWindow" aria-live="polite" aria-label="Chat messages">
                <div class="messages" id="messageContainer">
                    <!-- messages / welcome render here -->
                </div>
            </section>

            <div class="composer">
                <div class="composer-inner">
                    <form class="composer-form" id="chatForm" autocomplete="off">
                        <textarea
                            class="composer-input"
                            id="userInput"
                            rows="1"
                            placeholder="Message Buddy AI…"
                            aria-label="Message"
                        ></textarea>
                        <button class="send-btn" type="submit" id="sendBtn" aria-label="Send message" title="Send (Enter)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <line x1="12" y1="19" x2="12" y2="5"></line>
                                <polyline points="5 12 12 5 19 12"></polyline>
                            </svg>
                        </button>
                    </form>
                    <div class="composer-hint">
                        <kbd>Enter</kbd> to send · <kbd>Shift</kbd>+<kbd>Enter</kbd> for newline
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- In-app confirm dialog (replaces window.confirm) -->
    <div class="scrim" id="confirmScrim" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmBody">
        <div class="dialog">
            <h3 id="confirmTitle">Are you sure?</h3>
            <p id="confirmBody">This action cannot be undone.</p>
            <div class="dialog-actions">
                <button class="btn btn-ghost" type="button" data-confirm="cancel">Cancel</button>
                <button class="btn btn-danger" type="button" data-confirm="ok">Confirm</button>
            </div>
        </div>
    </div>



    <script>
        /* ======================================================================
       Buddy AI — chat logic
       - Single session memory logic (no persistent chats).
       - Keeps the styling and user experience.
       ====================================================================== */

    const $ = (id) => document.getElementById(id);

    const messageContainer = $('messageContainer');
    const chatWindow       = $('chatWindow');
    const chatForm         = $('chatForm');
    const userInput        = $('userInput');
    const sendBtn          = $('sendBtn');
    const modelPicker      = $('modelPicker');
    const modelPillLabel   = $('modelPillLabel');
    const sidebarEl        = $('sidebar');
    const sidebarScrimEl   = $('sidebarScrim');
    const menuBtn          = $('menuBtn');
    const sidebarToggle    = $('sidebarToggle');
    const expandFloat      = $('expandFloat');
    const newChatBtn       = $('newChatBtn');
    const brandLogo        = $('brandLogo');
    const confirmScrim     = $('confirmScrim');
    const confirmTitle     = $('confirmTitle');
    const confirmBody      = $('confirmBody');

    let conversationHistory = [];
    let currentModelId = 'brebeuf-pro';

    /* ------------------------------------------------------------------ */
    /*  Brand logo fallback rendering                                     */
    /* ------------------------------------------------------------------ */
    let logoLoaded = false;
    let logoErrored = false;

    function makeLogoImg() {
        const img = new Image();
        img.alt = '';
        img.src = 'placeholder.png';
        return img;
    }

    function renderBrandLogo() {
        const img = makeLogoImg();
        img.onload = () => {
            logoLoaded = true;
            brandLogo.innerHTML = '';
            brandLogo.appendChild(img);
            document.querySelectorAll('.avatar[data-role="assistant"]').forEach(a => {
                a.innerHTML = '';
                a.appendChild(makeLogoImg());
            });
            document.querySelectorAll('.welcome-mark').forEach(m => {
                if (!m.querySelector('img')) {
                    m.innerHTML = '';
                    m.appendChild(makeLogoImg());
                }
            });
        };
        img.onerror = () => {
            logoErrored = true;
            brandLogo.innerHTML = '<span class="brand-logo-fallback">B</span>';
            document.querySelectorAll('.avatar[data-role="assistant"]').forEach(a => {
                a.textContent = 'B';
            });
            document.querySelectorAll('.welcome-mark').forEach(m => {
                if (!m.textContent) m.textContent = 'B';
            });
        };
        brandLogo.innerHTML = '<span class="brand-logo-fallback">B</span>';
    }
    renderBrandLogo();

    /* ------------------------------------------------------------------ */
    /*  In-app confirm dialog                                             */
    /* ------------------------------------------------------------------ */
    function inAppConfirm({ title, body, okLabel = 'Confirm', cancelLabel = 'Cancel', danger = false } = {}) {
        return new Promise((resolve) => {
            confirmTitle.textContent = title || 'Are you sure?';
            confirmBody.textContent  = body  || '';
            const okBtn = confirmScrim.querySelector('[data-confirm="ok"]');
            const cancelBtn = confirmScrim.querySelector('[data-confirm="cancel"]');
            okBtn.textContent = okLabel;
            cancelBtn.textContent = cancelLabel;
            okBtn.className = 'btn ' + (danger ? 'btn-danger' : 'btn-primary');
            confirmScrim.dataset.open = 'true';

            const cleanup = (result) => {
                confirmScrim.dataset.open = 'false';
                okBtn.removeEventListener('click', onOk);
                cancelBtn.removeEventListener('click', onCancel);
                document.removeEventListener('keydown', onKey);
                resolve(result);
            };
            const onOk     = () => cleanup(true);
            const onCancel = () => cleanup(false);
            const onKey    = (e) => {
                if (e.key === 'Escape') cleanup(false);
                else if (e.key === 'Enter') cleanup(true);
            };
            okBtn.addEventListener('click', onOk);
            cancelBtn.addEventListener('click', onCancel);
            document.addEventListener('keydown', onKey);
            setTimeout(() => okBtn.focus(), 50);
        });
    }

    /* ------------------------------------------------------------------ */
    /*  Model rendering and switching                                     */
    /* ------------------------------------------------------------------ */
    function renderModelPicker() {
        [...modelPicker.querySelectorAll('.model-option')].forEach(btn => {
            const isActive = (btn.dataset.model === 'pro' && currentModelId === 'brebeuf-pro') ||
                             (btn.dataset.model === 'mini' && currentModelId === 'brebeuf-mini');
            btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
            btn.setAttribute('aria-checked', isActive ? 'true' : 'false');
        });
        modelPillLabel.textContent = currentModelId === 'brebeuf-pro' ? 'Pro' : 'Mini';
    }

    function clearChat() {
        conversationHistory = [];
        renderMessages();
    }

    /* ------------------------------------------------------------------ */
    /*  Sidebar navigation drawer                                         */
    /* ------------------------------------------------------------------ */
    const isMobile = () => window.matchMedia('(max-width: 820px)').matches;

    function openSidebar() {
        if (isMobile()) {
            sidebarEl.dataset.open = 'true';
            menuBtn.setAttribute('aria-expanded', 'true');
        } else {
            sidebarEl.classList.remove('is-collapsed');
            sidebarToggle.setAttribute('aria-expanded', 'true');
            sidebarToggle.setAttribute('aria-label', 'Collapse sidebar');
            sidebarToggle.innerHTML = `
                <svg class="icon-collapse" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                <span class="sidebar-toggle-label">Collapse</span>
            `;
        }
    }
    function closeSidebar() {
        if (isMobile()) {
            sidebarEl.dataset.open = 'false';
            menuBtn.setAttribute('aria-expanded', 'false');
        } else {
            sidebarEl.classList.add('is-collapsed');
            sidebarToggle.setAttribute('aria-expanded', 'false');
            sidebarToggle.setAttribute('aria-label', 'Open sidebar');
            sidebarToggle.innerHTML = `
                <svg class="icon-expand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            `;
        }
    }
    function toggleSidebar() {
        if (isMobile()) {
            if (sidebarEl.dataset.open === 'true') closeSidebar();
            else openSidebar();
        } else {
            if (sidebarEl.classList.contains('is-collapsed')) openSidebar();
            else closeSidebar();
        }
    }
    menuBtn.addEventListener('click', toggleSidebar);
    sidebarScrimEl.addEventListener('click', closeSidebar);
    sidebarToggle.addEventListener('click', toggleSidebar);
    expandFloat.addEventListener('click', openSidebar);
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            if (isMobile() && sidebarEl.dataset.open === 'true') closeSidebar();
            else if (!isMobile() && !sidebarEl.classList.contains('is-collapsed')) closeSidebar();
        }
    });

    /* ------------------------------------------------------------------ */
    /*  Model picker click listener                                       */
    /* ------------------------------------------------------------------ */
    modelPicker.addEventListener('click', async (e) => {
        const btn = e.target.closest('.model-option');
        if (!btn) return;
        const modelShort = btn.dataset.model;
        
        if (modelShort === 'mini') {
            window.location.href = 'mini-html/index.html';
            return;
        }

        const nextModelId = 'brebeuf-pro';
        if (nextModelId === currentModelId) return;

        if (conversationHistory.length > 0) {
            const ok = await inAppConfirm({
                title: 'Switch models?',
                body: 'Switching models will end your current conversation and clear the chat history.',
                okLabel: 'Switch model',
            });
            if (!ok) return;
        }

        currentModelId = nextModelId;
        renderModelPicker();
        clearChat();
    });

    /* ------------------------------------------------------------------ */
    /*  New chat listener                                                 */
    /* ------------------------------------------------------------------ */
    newChatBtn.addEventListener('click', async () => {
        if (conversationHistory.length === 0) {
            userInput.focus();
            return;
        }
        const ok = await inAppConfirm({
            title: 'Start new chat?',
            body: 'This will clear the current conversation history.',
            okLabel: 'Confirm',
        });
        if (ok) {
            clearChat();
            userInput.focus();
        }
    });

    /* ------------------------------------------------------------------ */
    /*  Markdown + highlight.js setup                                     */
    /* ------------------------------------------------------------------ */
    marked.setOptions({
        highlight: (code) => hljs.highlightAuto(code).value,
        breaks: true,
    });

    /* ------------------------------------------------------------------ */
    /*  Message rendering                                                 */
    /* ------------------------------------------------------------------ */
    function appendMessageDOM(role, text) {
        const wrap = document.createElement('div');
        wrap.className = 'message ' + role;

        const av = document.createElement('div');
        av.className = 'avatar';
        av.dataset.role = role;
        av.setAttribute('aria-hidden', 'true');

        if (role === 'assistant') {
            if (logoLoaded) av.appendChild(makeLogoImg());
            else            av.textContent = logoErrored ? 'B' : '';
            if (!logoLoaded && !logoErrored) {
                const fill = () => {
                    if (logoLoaded) { av.innerHTML = ''; av.appendChild(makeLogoImg()); }
                    else if (logoErrored) av.textContent = 'B';
                };
                setTimeout(fill, 80);
                setTimeout(fill, 300);
            }
        } else {
            av.textContent = 'U';
        }

        const body = document.createElement('div');
        body.className = 'msg-body';

        const meta = document.createElement('div');
        meta.className = 'msg-meta';
        meta.textContent = role === 'user'
            ? 'You'
            : 'Buddy AI · ' + (currentModelId === 'brebeuf-pro' ? 'Pro' : 'Mini');

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        if (typeof text === 'string') {
            bubble.innerHTML = text;
        } else if (text instanceof HTMLElement) {
            bubble.appendChild(text);
        }

        body.appendChild(meta);
        body.appendChild(bubble);
        wrap.appendChild(av);
        wrap.appendChild(body);
        messageContainer.appendChild(wrap);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return { wrap, bubble };
    }

    function clearMessagesDOM() {
        messageContainer.innerHTML = '';
    }

    function renderMessages() {
        clearMessagesDOM();
        renderWelcome({ hideSuggestions: conversationHistory.length > 0 });
        if (conversationHistory.length > 0) {
            for (const m of conversationHistory) {
                appendMessageDOM(m.role, marked.parse(m.content));
            }
            if (window.MathJax) {
                MathJax.typesetPromise([messageContainer]);
            }
        }
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function renderWelcome({ hideSuggestions = false } = {}) {
        const welcome = document.createElement('div');
        welcome.className = 'welcome';
        welcome.innerHTML = `
            <div class="welcome-mark" aria-hidden="true"></div>
            <h1><span class="accent">Hello.</span> I'm Buddy AI.</h1>
            ${hideSuggestions ? '' : `
            <div class="suggestions" role="list">
                <button class="suggestion" type="button" data-prompt="Introduce yourself — who are you, and what can you help me with?">👋 Introduce yourself</button>
                <button class="suggestion" type="button" data-prompt="What does Mr. Tauro teach?">👨‍🏫 What does Mr. Tauro teach?</button>
                <button class="suggestion" type="button" data-prompt="Explain quantum entanglement like I'm 15.">⚛️ Explain quantum entanglement</button>
                <button class="suggestion" type="button" data-prompt="Write a short poem about the first day of school.">📝 Write a school poem</button>
                <button class="suggestion" type="button" data-prompt="Help me outline a 5-paragraph essay on the causes of WWI.">📜 Outline an essay on WWI</button>
                <button class="suggestion" type="button" data-prompt="Give me 5 healthy lunch ideas I can meal-prep on Sunday.">🥗 5 meal-prep lunch ideas</button>
            </div>
            `}
        `;
        messageContainer.appendChild(welcome);

        const mark = welcome.querySelector('.welcome-mark');
        const markImg = new Image();
        markImg.alt = '';
        markImg.src = 'placeholder.png';
        markImg.onload = () => mark.appendChild(markImg);
        markImg.onerror = () => { mark.textContent = 'B'; };

        if (!hideSuggestions) {
            welcome.querySelectorAll('.suggestion').forEach(btn => {
                btn.addEventListener('click', () => {
                    userInput.value = btn.dataset.prompt;
                    userInput.focus();
                    autoResize();
                    chatForm.requestSubmit();
                });
            });
        }
    }

    /* ------------------------------------------------------------------ */
    /*  Test mode — typing 1234567 short-circuits the LLM                 */
    /* ------------------------------------------------------------------ */
    const TEST_CANNED = `# Buddy AI — formatting test response

This is a **test message** triggered by typing \`1234567\`. It exercises the same render path as a real LLM reply so you can verify everything looks right.

## Markdown checklist

- **Bold**, *italic*, ~~strikethrough~~, \`inline code\`.
- A [link to example.com](https://example.com) should open in a new tab.
- A bullet list:
  - One
  - Two
  - Three
- A numbered list:
  1. First
  2. Second
  3. Third

### Code block

\`\`\`python
def fib(n, memo={}):
    if n in memo: return memo[n]
    if n < 2: return n
    memo[n] = fib(n - 1) + fib(n - 2)
    return memo[n]
\`\`\`

### Table

| Model  | Endpoint        | Status |
|--------|-----------------|--------|
| Pro    | cerebras-qwen   | ✅ On   |
| Mini   | example.com     | ↗ Redirect |

### LaTeX

Inline: $E = mc^2$. Block:

$$
\\int_{-\\infty}^{\\infty} e^{-x^2}\\,dx = \\sqrt{\\pi}
$$

> Quote: if it renders cleanly, the build is healthy.`;

    async function testReply() {
        conversationHistory.push({ role: 'user', content: '1234567' });
        renderMessages();

        const aiNode = appendMessageDOM('assistant', '<span class="thinking">Thinking…</span>');
        const bubble = aiNode.bubble;

        const chunks = TEST_CANNED.match(/.{1,40}/gs) || [TEST_CANNED];
        let fullText = '';
        bubble.innerHTML = '';
        for (const chunk of chunks) {
            fullText += chunk;
            bubble.innerHTML = marked.parse(fullText);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            await new Promise(r => setTimeout(r, 14));
        }
        conversationHistory.push({ role: 'assistant', content: fullText });
        if (window.MathJax) MathJax.typesetPromise([bubble]);
    }

    /* ------------------------------------------------------------------ */
    /*  LLM call                                                          */
    /* ------------------------------------------------------------------ */
    let isSending = false;

    async function askAI(userMsg) {
        if (isSending) return;
        isSending = true;
        sendBtn.classList.add('is-sending');
        sendBtn.disabled = true;

        conversationHistory.push({ role: 'user', content: userMsg });
        renderMessages();

        const aiNode = appendMessageDOM('assistant', '<span class="thinking">Thinking…</span>');
        const bubble = aiNode.bubble;

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    modelId: currentModelId,
                    messages: conversationHistory,
                }),
            });

            if (!response.ok) {
                let detail = '';
                try { detail = (await response.text()).slice(0, 200); } catch (e) {}
                throw new Error(`Server returned ${response.status}${detail ? ' — ' + detail : ''}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = "";
            bubble.innerHTML = "";

            let lastUpdate = 0;
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6).trim();
                        if (data === '[DONE]') break;
                        try {
                            const json = JSON.parse(data);
                            const content = json.choices?.[0]?.delta?.content;
                            if (content) {
                                fullText += content;
                                const now = Date.now();
                                if (now - lastUpdate > 30) {
                                    bubble.innerHTML = marked.parse(fullText);
                                    chatWindow.scrollTop = chatWindow.scrollHeight;
                                    lastUpdate = now;
                                }
                            }
                        } catch (e) {}
                    }
                }
            }
            bubble.innerHTML = marked.parse(fullText);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            conversationHistory.push({ role: 'assistant', content: fullText });
            if (window.MathJax) MathJax.typesetPromise([bubble]);

        } catch (err) {
            console.error(err);
            const isRateLimit = err.message && /429|rate limit/i.test(err.message);
            if (isRateLimit) {
                // Remove the last user message to avoid duplication on retry
                const popped = conversationHistory.pop();
                bubble.innerHTML = `
                    <div class="error-block">
                        <div class="error-title">Rate limit exceeded</div>
                        <div class="error-body">Waiting 12 seconds before retrying...</div>
                    </div>
                `;
                setTimeout(() => askAI(userMsg), 12000);
            } else {
                bubble.innerHTML = `
                    <div class="error-block">
                        <div class="error-title">Hmm, something's not working.</div>
                        <div class="error-body">${err.message || 'Maybe try again later or change models.'}</div>
                        <div class="error-actions">
                            <button class="btn btn-primary" type="button" data-action="retry">Try again</button>
                        </div>
                    </div>
                `;
                const retry = bubble.querySelector('[data-action="retry"]');
                retry.addEventListener('click', () => {
                    const lastUserMsg = conversationHistory.pop()?.content;
                    if (lastUserMsg) {
                        askAI(lastUserMsg);
                    }
                });
            }
        } finally {
            isSending = false;
            sendBtn.classList.remove('is-sending');
            sendBtn.disabled = false;
        }
    }

    /* ------------------------------------------------------------------ */
    /*  Composer — auto-resizing textarea + shortcuts                    */
    /* ------------------------------------------------------------------ */
    function autoResize() {
        userInput.style.height = 'auto';
        userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
    }
    userInput.addEventListener('input', autoResize);

    chatForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = userInput.value.trim();
        if (!text || isSending) return;

        userInput.value = '';
        autoResize();

        if (text === '1234567') {
            testReply();
            return;
        }
        askAI(text);
    });

    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            chatForm.requestSubmit();
        }
    });

    /* ------------------------------------------------------------------ */
    /*  Global shortcuts                                                  */
    /* ------------------------------------------------------------------ */
    document.addEventListener('keydown', (e) => {
        const tag = (e.target && e.target.tagName) || '';
        const inField = tag === 'INPUT' || tag === 'TEXTAREA';
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'O' || e.key === 'o')) {
            e.preventDefault();
            clearChat();
            userInput.focus();
        }
        if ((e.ctrlKey || e.metaKey) && (e.key === 'b' || e.key === 'B') && !inField) {
            e.preventDefault();
            toggleSidebar();
        }
    });

    /* ------------------------------------------------------------------ */
    /*  Boot                                                              */
    /* ------------------------------------------------------------------ */
    renderModelPicker();
    renderWelcome();
    userInput.focus();
    </script>
</body>
